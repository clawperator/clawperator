site:
  output_dir: sites/docs/docs
  scratch_dir: sites/docs/.generated
  inventory_file: sites/docs/docs_inventory.json
  build_metadata_file: sites/docs/docs_build.json

repos:
  clawperator_root: .
  node_api_root: apps/node
  skills_root: ../clawperator-skills

rules:
  preserve_titles: true
  preserve_slugs: true
  preserve_order: true
  forbid_reflow_only_changes: true
  max_changed_files: 12
  max_line_churn: 400
  max_percent_churn: 20

sections:
  - id: home
    title: Home
    pages:
      - output: index.md
        title: Clawperator Docs
        mode: copy
        sources:
          - docs/index.md

  - id: getting-started
    title: Getting Started
    pages:
      - output: getting-started/running-clawperator-on-android.md
        title: Running Clawperator on Android
        mode: copy
        sources:
          - docs/running-clawperator-on-android.md
      - output: getting-started/terminology.md
        title: Clawperator Terminology
        mode: copy
        sources:
          - docs/terminology.md
      - output: getting-started/first-time-setup.md
        title: First-Time Setup
        mode: copy
        sources:
          - docs/first-time-setup.md
      - output: getting-started/openclaw-first-run.md
        title: OpenClaw First Run
        mode: copy
        sources:
          - docs/openclaw-first-run.md
      - output: getting-started/project-overview.md
        title: Project Overview
        mode: copy
        sources:
          - docs/project-overview.md
      - output: getting-started/android-operator-apk.md
        title: Clawperator Operator Android app
        mode: copy
        sources:
          - docs/android-operator-apk.md

  - id: architecture
    title: Architecture
    pages:
      - output: architecture/architecture.md
        title: Clawperator Architecture
        mode: copy
        sources:
          - docs/architecture.md


  - id: ai-agents
    title: For AI Agents
    pages:
      - output: ai-agents/agent-quickstart.md
        title: Agent Quickstart
        mode: copy
        sources:
          - docs/agent-quickstart.md
      - output: ai-agents/android-recording.md
        title: Android Recording Format for Agents
        mode: copy
        sources:
          - docs/android-recording.md
      - output: ai-agents/node-api-for-agents.md
        title: Clawperator Node API - Agent Guide
        mode: copy
        sources:
          - docs/node-api-for-agents.md
      - output: ai-agents/navigation-patterns.md
        title: Navigation Patterns for Agents
        mode: copy
        sources:
          - docs/navigation-patterns.md
      - output: ai-agents/multi-device-workflows.md
        title: Multi-Device Workflows for Agents
        mode: copy
        sources:
          - docs/multi-device-workflows.md

  - id: reference
    title: Reference
    pages:
      - output: reference/cli-reference.md
        title: CLI Reference
        mode: code-derived
        sources:
          - apps/node/src/cli/index.ts
          - apps/node/src/cli/commands
        notes: Prefer extracting commands and flags from source or live CLI help.
      - output: reference/error-codes.md
        title: Error Codes
        mode: code-derived
        sources:
          - apps/node/src/contracts/errors.ts
          - apps/node/src/contracts/result.ts
        notes: Keep error names and semantics aligned to code.
      - output: reference/api-overview.md
        title: API Overview
        mode: curated
        sources:
          - docs/node-api-for-agents.md
          - apps/node/src/contracts
        notes: Keep narrative short. Reference code-derived details instead of duplicating them.
      - output: reference/action-types.md
        title: Action Types Reference
        mode: copy
        sources:
          - docs/reference/action-types.md
      - output: reference/execution-model.md
        title: Clawperator Execution Model
        mode: copy
        sources:
