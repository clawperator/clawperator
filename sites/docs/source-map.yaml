        mode: copy
        sources:
          - docs/reference/device-and-package-model.md
      - output: reference/snapshot-format.md
        title: Clawperator Snapshot Format
        mode: copy
        sources:
          - docs/snapshot-format.md
      - output: reference/error-handling.md
        title: Error Handling Guide
        mode: copy
        sources:
          - docs/reference/error-handling.md
      - output: reference/node-api-doctor.md
        title: Clawperator Doctor
        mode: copy
        sources:
          - docs/reference/node-api-doctor.md
      - output: reference/environment-variables.md
        title: Environment Variables
        mode: copy
        sources:
