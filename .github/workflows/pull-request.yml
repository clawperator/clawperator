name: Pull Request Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  commit-message-guard:
    name: Validate Commit Messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make validation script executable
        run: chmod +x ./scripts/validate_commit_messages.sh

      - name: Validate commit messages for PR
        if: github.event_name == 'pull_request'
        run: ./scripts/validate_commit_messages.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Validate commit messages for push
        if: github.event_name == 'push'
        run: ./scripts/validate_commit_messages.sh "${{ github.event.before }}" "${{ github.sha }}"

  docs-build:
    name: Build Docs Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run docs build
        run: ./scripts/docs_build.sh

  android-unit-tests:
    name: Run Android Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'  # Adjust this version if needed
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew unitTest

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/

  node-tests:
    name: Run Node Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/node/package-lock.json

      - name: Install Node dependencies
        run: npm --prefix apps/node ci

      - name: Build Node package
        run: npm --prefix apps/node run build

      - name: Run Node tests
        run: npm --prefix apps/node run test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results
          path: |
            apps/node/dist/test/

  validation-tests:
    name: Run Validation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/node/package-lock.json

      - name: Install Node dependencies
        run: npm --prefix apps/node ci

      - name: Build Node package
        run: npm --prefix apps/node run build

      - name: Make validation scripts executable
        run: chmod +x validation/test_doctor.sh validation/test_install_multidevice.sh

      - name: Run doctor validation
        run: bash validation/test_doctor.sh

      - name: Run multi-device install validation
        run: bash validation/test_install_multidevice.sh
